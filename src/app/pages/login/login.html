<div class="login-container">
  <div class="login-box">
    <h2>🔐 Login</h2>

    <div *ngIf="error" class="error">{{ error }}</div>

    <input
      type="email"
      placeholder="Email"
      [(ngModel)]="email">

    <input
      type="password"
      placeholder="Password"
      [(ngModel)]="password">

    <button (click)="onLogin()">Login</button>
  </div>
</div>
