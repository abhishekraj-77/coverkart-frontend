<div class="admin">

  <div class="admin-header">
    <h1>🛠️ Admin Panel</h1>
    <button class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <!-- Message -->
  <div *ngIf="message()" class="message">
    {{ message() }}
  </div>

  <!-- Add Product Form -->
  <div class="add-product">
    <h2>Add New Product</h2>

    <div class="form-grid">
      <input placeholder="Product Name" [(ngModel)]="newProduct.name">
      <input type="number" placeholder="Price" [(ngModel)]="newProduct.price">
      <input placeholder="Image URL" [(ngModel)]="newProduct.image">
      <input placeholder="Category" [(ngModel)]="newProduct.category">
      <input type="number" placeholder="Stock" [(ngModel)]="newProduct.stock">
      <input placeholder="Description" [(ngModel)]="newProduct.description">
    </div>

    <button (click)="addProduct()">Add Product</button>
  </div>

  <!-- Products List -->
  <div class="products-list">
    <h2>All Products</h2>

    <div class="product-row" *ngFor="let product of products()">
      <img [src]="product.image" [alt]="product.name">

      <div class="product-info">
        <h3>{{ product.name }}</h3>
        <p>
          {{ product.category }} |
          ₹{{ product.price }} |
          Stock: {{ product.stock }}
        </p>
      </div>

      <button class="delete-btn" (click)="deleteProduct(product._id)">
        Delete
      </button>
    </div>

    <!-- Empty State -->
    <p *ngIf="products().length === 0">
      No products yet. Add your first product!
    </p>
  </div>

</div>
